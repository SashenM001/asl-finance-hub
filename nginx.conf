server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index _shell.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location = /health {
    access_log off;
    return 200 "ok\n";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: TanStack Start SPA mode emits dist/client/_shell.html as the shell.
  # Any unmatched path (including /) returns the shell so the client-side router can take over.
  location / {
    try_files $uri $uri/ /_shell.html;
  }
}
